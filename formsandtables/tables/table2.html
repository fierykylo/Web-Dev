<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: serif; }
  table {
    border-collapse: collapse;
    margin: auto;
  }
  th, td {
    border: 2px solid #444;
    padding: 10px 15px;
    text-align: center;
  }
  h2 { text-align: center; }
</style>
</head>
<body>

<h2>TIME TABLE</h2>

<table>

<tr>
  <th>Day/Period</th>
  <th>I</th>
  <th>II</th>
  <th>III</th>
  <th>12:00–12:40</th>
  <th>IV</th>
  <th>V</th>
  <th>VI</th>
  <th>VII</th>
</tr>

<tr>
  <td>Monday</td>
  <td>Eng</td>
  <td>Mat</td>
  <td>Che</td>

  <!-- LUNCH -->
  <td rowspan="6"><b>L<br>U<br>N<br>C<br>H</b></td>

  <td colspan="3">LAB</td>
  <td>Phy</td>
</tr>

<tr>
  <td>Tuesday</td>
  <td colspan="3">LAB</td>
  <td>Eng</td>
  <td>Che</td>
  <td>Mat</td>
  <td>SPORTS</td>
</tr>

<tr>
  <td>Wednesday</td>
  <td>Mat</td>
  <td>Phy</td>
  <td>Eng</td>
  <td>Che</td>
  <td colspan="3">LIBRARY</td>
</tr>

<tr>
  <td>Thursday</td>
  <td>Phy</td>
  <td>Eng</td>
  <td>Che</td>
  <td colspan="3">LAB</td>
  <td>Mat</td>
</tr>

<tr>
  <td>Friday</td>
  <td colspan="3">LAB</td>
  <td>Mat</td>
  <td>Che</td>
  <td>Eng</td>
  <td>Phy</td>
</tr>

<tr>
  <td>Saturday</td>
  <td>Eng</td>
  <td>Che</td>
  <td>Mat</td>
  <td colspan="3">SEMINAR</td>
  <td>SPORTS</td>
</tr>

</table>
</body>
</html>
